<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FREESTYLR - Mobile</title>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0b0b0b; 
            color: #e0e0e0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 10px;
            box-sizing: border-box;
            transition: background 0.1s; 
        }
        
        .container { 
            background: #161616; 
            padding: 1.5rem; 
            border-radius: 20px; 
            border: 1px solid #333; 
            width: 100%; 
            max-width: 480px; /* Limits size on desktop */
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
        }
        
        h1 { margin: 0; letter-spacing: 4px; font-weight: 800; font-size: 1.5rem; }
        .logo-accent { color: #00ffcc; text-shadow: 0 0 10px rgba(0, 255, 204, 0.3); }

        .display-area { 
            height: 140px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-size: 2.2rem; /* Scaled down for mobile screens */
            font-weight: 900; 
            color: #00ffcc; 
            margin: 15px 0 0 0; 
            border-radius: 12px 12px 0 0; 
            background: #000; 
            box-shadow: inset 0 0 20px #00ffcc22; 
            overflow: hidden; 
            padding: 0 10px; 
            text-transform: uppercase; 
            position: relative; 
        }

        /* Adjust font size for very long words on small screens */
        @media (max-width: 380px) {
            .display-area { font-size: 1.8rem; height: 120px; }
            h1 { font-size: 1.2rem; }
        }

        #theme-badge { position: absolute; top: 8px; font-size: 0.6rem; color: #00ffcc; opacity: 0.5; letter-spacing: 1px; }
        
        .timer-container { width: 100%; height: 6px; background: #222; border-radius: 0 0 12px 12px; margin-bottom: 15px; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: #00ffcc; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { 
            padding: 16px; /* Larger touch target */
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.9rem;
            transition: 0.2s; 
            -webkit-tap-highlight-color: transparent;
        }
        .btn-start { background: #00ffcc; color: #000; grid-column: span 2; font-size: 1.1rem; }
        .btn-mode { background: #333; color: #ccc; }
        .btn-mode.active { background: #444; border: 1px solid #00ffcc; color: #fff; }
        
        .theme-input-wrap { grid-column: span 2; margin: 5px 0; }
        #custom-theme { 
            width: 100%; 
            padding: 14px; 
            background: #111; 
            border: 1px solid #444; 
            border-radius: 8px; 
            color: #00ffcc; 
            box-sizing: border-box; 
            font-size: 1rem; /* Prevents iOS auto-zoom on focus */
            text-align: center; 
        }

        .slider-group { margin-top: 15px; background: #222; padding: 15px; border-radius: 10px; text-align: left; }
        .label-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.8rem; color: #888; }
        input[type=range] { width: 100%; accent-color: #00ffcc; cursor: pointer; height: 25px; }
        
        #history { margin-top: 15px; font-size: 0.75rem; color: #666; font-style: italic; min-height: 1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

<div class="container">
    <h1>FREE<span class="logo-accent">STYLR</span></h1>
    
    <div class="display-area" id="word-display">
        <div id="theme-badge">THEME: INITIALIZING</div>
        READY
    </div>
    <div class="timer-container"><div id="timer-bar"></div></div>
    
    <div id="history">History: ---</div>
    
    <div class="controls">
        <button class="btn-mode active" id="mode-assoc" onclick="setMode('assoc')">Association</button>
        <button class="btn-mode" id="mode-rhyme" onclick="setMode('rhyme')">Rhyme Trainer</button>
        
        <div class="theme-input-wrap">
            <input type="text" id="custom-theme" placeholder="Tap to type theme..." onchange="refreshWordBank()">
        </div>

        <button class="btn-start" id="start-btn" onclick="toggleSession()">START SESSION</button>
    </div>

    <div class="slider-group">
        <div class="label-row"><span>BPM</span><span id="bpm-val">90</span></div>
        <input type="range" id="bpm-slider" min="40" max="160" step="1" value="90" oninput="updateBPM(this.value)">
        
        <div class="label-row" style="margin-top:15px;"><span>Max Syllables</span><span id="syl-val">2</span></div>
        <input type="range" id="syl-slider" min="1" max="5" step="1" value="2" oninput="updateSyllables(this.value)">

        <div class="label-row" style="margin-top:15px;"><span>Word Every</span><span id="bar-val">4</span> Beats</div>
        <input type="range" id="bar-slider" min="2" max="16" step="2" value="4" oninput="updateBars(this.value)">
    </div>
</div>

<script>
    const backupWords = ["GALAXY", "PHANTOM", "CIRCUIT", "MIRROR", "GRAVITY", "ECHO", "THUNDER", "VORTEX", "HORIZON", "DIAMOND"];
    let wordBank = [...backupWords]; 
    let wordPointer = 0; 
    let history = [];
    let audioCtx, bpm = 90, isRunning = false, currentMode = 'assoc', currentStep = 0, wordInterval = 4, maxSyllables = 2;
    let timerID, animationID, nextNoteTime = 0.0, lastWordTime = 0.0, isFetching = false;

    function shuffle(array) {
        let arr = Array.from(array);
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[arr[j]]] = [arr[arr[j]], arr[i]];
        }
        return arr;
    }

    async function refreshWordBank() {
        if (isFetching) return;
        isFetching = true;
        let seed = document.getElementById('custom-theme').value.trim().toLowerCase();
        let isAuto = !seed;

        if (isAuto) {
            const seeds = currentMode === 'assoc' ? ["street", "space", "power", "hustle", "night", "ocean", "digital"] : ["ay", "ee", "eye", "oh", "oo", "at", "it", "en"];
            seed = seeds[Math.floor(Math.random() * seeds.length)];
        }
        
        document.getElementById('theme-badge').innerText = `THEME: ${seed.toUpperCase()} ${isAuto ? '(AUTO)' : '(LOCKED)'}`;

        try {
            const response = await fetch(`https://api.datamuse.com/words?${currentMode === 'assoc' ? 'ml' : 'rel_rhy'}=${seed}&max=250&md=s`);
            const data = await response.json();
            const filtered = data
                .filter(obj => (obj.numSyllables || 1) <= maxSyllables && /^[a-zA-Z]+$/.test(obj.word))
                .map(obj => obj.word.toUpperCase());
            if (filtered.length > 5) { wordBank = [...new Set(filtered)]; }
        } catch (e) { console.error("❌ API Error"); } finally { isFetching = false; }
    }

    function refillQueue() {
        wordBank = shuffle(wordBank.length > 0 ? wordBank : backupWords);
        wordPointer = 0;
    }

    function updateBPM(val) { bpm = parseInt(val); document.getElementById('bpm-val').innerText = val; }
    function updateBars(val) { wordInterval = parseInt(val); document.getElementById('bar-val').innerText = val; }
    function updateSyllables(val) { maxSyllables = parseInt(val); document.getElementById('syl-val').innerText = val; refreshWordBank(); }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('mode-assoc').classList.toggle('active', mode === 'assoc');
        document.getElementById('mode-rhyme').classList.toggle('active', mode === 'rhyme');
        wordPointer = 9999; 
        refreshWordBank();
    }

    function playClick(isDownbeat) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(isDownbeat ? 1000 : 600, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        if (isDownbeat) {
            document.body.style.backgroundColor = "#1a1a1a";
            setTimeout(() => { document.body.style.backgroundColor = "#0b0b0b"; }, 70);
        }
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            tick(currentStep);
            nextNoteTime += 60.0 / bpm;
            currentStep++;
        }
        timerID = setTimeout(scheduler, 25.0);
    }

    function updateVisuals() {
        if (!isRunning) return;
        const bar = document.getElementById('timer-bar');
        const secondsPerWord = (60 / bpm) * wordInterval;
        const elapsedSinceWord = audioCtx.currentTime - lastWordTime;
        const progress = Math.min(elapsedSinceWord / secondsPerWord, 1);
        bar.style.transition = progress < 0.05 ? 'none' : 'width 0.05s linear';
        bar.style.width = `${(1 - progress) * 100}%`;
        animationID = requestAnimationFrame(updateVisuals);
    }

    function tick(step) {
        playClick(step % 4 === 0);
        if (step % wordInterval === 0) {
            lastWordTime = nextNoteTime;
            const display = document.getElementById('word-display');
            if (wordPointer >= wordBank.length) refillQueue();
            let newWord = wordBank[wordPointer];
            wordPointer++;
            const currentText = Array.from(display.childNodes).find(n => n.nodeType === 3)?.textContent || "";
            if (currentText && currentText !== "READY") {
                history.unshift(currentText.trim());
                if (history.length > 5) history.pop();
                document.getElementById('history').innerText = "History: " + history.join(", ");
            }
            display.childNodes.forEach(node => { if (node.nodeType === 3) display.removeChild(node); });
            display.appendChild(document.createTextNode(newWord));
        }
    }

    function toggleSession() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const btn = document.getElementById('start-btn');
        if (isRunning) {
            clearTimeout(timerID);
            cancelAnimationFrame(animationID);
            isRunning = false;
            btn.innerText = "START SESSION";
            btn.style.background = "#00ffcc";
            document.getElementById('timer-bar').style.width = "100%";
        } else {
            isRunning = true;
            nextNoteTime = audioCtx.currentTime;
            lastWordTime = audioCtx.currentTime;
            currentStep = 0;
            if (wordPointer >= wordBank.length) refillQueue();
            scheduler();
            updateVisuals();
            btn.innerText = "STOP";
            btn.style.background = "#ff4444";
        }
    }

    refillQueue();
    refreshWordBank();
</script>
</body>
</html>
