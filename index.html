<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FREESTYLR - v6.4</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0b0b; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; }
        .container { background: #161616; padding: 1.5rem; border-radius: 24px; border: 1px solid #333; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        h1 { margin: 0; letter-spacing: 2px; font-weight: 800; font-size: 1.2rem; }
        .logo-accent { color: #00ffcc; }
        .fs-toggle { background: none; border: 1px solid #444; color: #666; padding: 4px 8px; font-size: 0.6rem; border-radius: 4px; cursor: pointer; }

        .display-area { height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 900; color: #00ffcc; margin: 10px 0 0 0; border-radius: 12px 12px 0 0; background: #000; box-shadow: inset 0 0 20px #00ffcc22; overflow: hidden; padding: 0 10px; text-transform: uppercase; position: relative; }
        
        #theme-container { position: absolute; top: 8px; display: flex; align-items: center; gap: 8px; opacity: 0.6; }
        #theme-badge { font-size: 0.6rem; color: #00ffcc; letter-spacing: 1px; }
        #skip-theme { background: #333; color: #fff; border: none; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
        
        #mute-toggle { position: absolute; bottom: 10px; right: 10px; font-size: 1rem; cursor: pointer; opacity: 0.4; transition: 0.2s; }
        #mute-toggle.active { opacity: 1; color: #ff4444; }

        .timer-container { width: 100%; height: 6px; background: #222; border-radius: 0 0 12px 12px; margin-bottom: 15px; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: #00ffcc; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        
        .theme-section { grid-column: span 2; display: flex; gap: 8px; }
        #custom-theme { flex-grow: 1; padding: 14px; background: #000; border: 1px solid #333; border-radius: 12px; color: #00ffcc; box-sizing: border-box; font-size: 1rem; text-align: center; }
        #custom-theme:focus { border-color: #00ffcc; outline: none; }
        .btn-refresh { background: #222; border: 1px solid #333; color: #00ffcc; padding: 0 15px; font-size: 1.2rem; }
        
        .btn-start { background: #00ffcc; color: #000; grid-column: span 2; font-size: 1.1rem; }
        .btn-start.midi-waiting { background: #222; color: #555; cursor: not-allowed; border: 1px dashed #444; }
        .btn-start.midi-active { background: #ff9500; color: #000; cursor: pointer; border: none; }
        
        .btn-mode { background: #222; color: #888; border: 1px solid #333; }
        .btn-mode.active { background: #333; border: 1px solid #00ffcc; color: #fff; }
        .btn-midi.active { border-color: #ff9500; color: #ff9500; box-shadow: 0 0 10px rgba(255, 149, 0, 0.2); }

        .midi-hint { grid-column: span 2; font-size: 0.65rem; color: #ff9500; margin-top: -5px; opacity: 0; transition: 0.3s; height: 0; overflow: hidden; }
        .midi-hint.show { opacity: 0.8; height: auto; margin-top: 5px; margin-bottom: 5px; }

        .slider-group { margin-top: 15px; background: #111; padding: 15px; border-radius: 16px; text-align: left; border: 1px solid #222; }
        .label-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.75rem; color: #666; font-weight: bold; text-transform: uppercase; }
        input[type=range] { width: 100%; accent-color: #00ffcc; cursor: pointer; height: 20px; }
        
        .toggle-group { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding: 0 5px; }
        .toggle-label { font-size: 0.75rem; color: #888; font-weight: bold; }
        
        #history { margin-top: 15px; font-size: 0.75rem; color: #444; font-style: italic; min-height: 1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FREE<span class="logo-accent">STYLR</span></h1>
        <button class="fs-toggle" onclick="toggleFullScreen()">FULLSCREEN</button>
    </header>
    
    <div class="display-area" id="word-display">
        <div id="theme-container">
            <div id="theme-badge">THEME: INITIALIZING</div>
            <button id="skip-theme" onclick="forceNewTheme()" title="Skip Current Theme">✕</button>
        </div>
        <div id="mute-toggle" onclick="toggleMute()">🔊</div>
        READY
    </div>
    <div class="timer-container"><div id="timer-bar"></div></div>
    <div id="history">---</div>
    
    <div class="controls">
        <button class="btn-mode active" id="mode-assoc" onclick="setMode('assoc')">Assoc</button>
        <button class="btn-mode" id="mode-rhyme" onclick="setMode('rhyme')">Rhyme</button>
        <button id="midi-btn" class="btn-mode btn-midi" style="grid-column: span 2;" onclick="toggleMidi()">MIDI SYNC: OFF</button>
        <div id="midi-hint" class="midi-hint">Hit PLAY on your DAW or Controller to start session</div>
        <div class="theme-section">
            <input type="text" id="custom-theme" placeholder="Type a theme..." onchange="refreshWordBank()">
            <button class="btn-refresh" onclick="forceNewTheme()">🎲</button>
        </div>
        <button class="btn-start" id="start-btn" onclick="toggleSession()">START SESSION</button>
    </div>

    <div class="slider-group">
        <div class="label-row"><span>BPM</span><span id="bpm-val">90</span></div>
        <input type="range" id="bpm-slider" min="40" max="160" step="1" value="90" oninput="updateBPM(this.value)">
        <div class="label-row" style="margin-top:12px;"><span>Every</span><span id="bar-val">4</span> Beats</div>
        <input type="range" id="bar-slider" min="2" max="16" step="2" value="4" oninput="updateBars(this.value)">
        <div class="label-row" style="margin-top:12px;"><span>Max Syllables</span><span id="syl-val">2</span></div>
        <input type="range" id="syl-slider" min="1" max="5" step="1" value="2" oninput="updateSyllables(this.value)">
        <div class="toggle-group">
            <span class="toggle-label">THEME DRIFT</span>
            <input type="checkbox" id="drift-toggle" checked onchange="updateDriftUI()">
        </div>
        <div id="drift-slider-container" style="margin-top:12px;">
            <div class="label-row"><span>Frequency</span><span id="drift-val">12</span> Words</div>
            <input type="range" id="drift-slider" min="4" max="48" step="4" value="12" oninput="updateDriftFreq(this.value)">
        </div>
    </div>
</div>

<script>
    const backupWords = ["STREET", "POWER", "GALAXY", "FLOW", "STORM", "NIGHT", "GOLD", "DREAM", "TRUTH", "RHYTHM"];
    let wordBank = [], wordPointer = 0, history = [], themeHistory = [], usedWords = new Set();
    let audioCtx, bpm = 90, isRunning = false, currentMode = 'assoc', currentStep = 0, wordInterval = 4, maxSyllables = 2;
    let timerID, animationID, nextNoteTime = 0.0, lastWordTime = 0.0, isFetching = false, isMuted = false, wordsSinceLastDrift = 0, driftFreq = 12;
    let currentActiveTheme = "";
    
    // MIDI Variables
    let midiEnabled = false, midiAccess = null, midiTickCount = 0, lastMidiPulseTime = 0, failsafeTimer = null;

    function countSyllables(word) {
        word = word.toLowerCase();
        if(word.length <= 3) return 1;
        word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
        word = word.replace(/^y/, '');
        const syl = word.match(/[aeiouy]{1,2}/g);
        return syl ? syl.length : 1;
    }

    function updateBadgeDisplay(isDrifting = false) {
        const badge = document.getElementById('theme-badge');
        const driftEnabled = document.getElementById('drift-toggle').checked;
        const suffix = (driftEnabled && isDrifting) ? " (DRIFTING)" : "";
        badge.innerText = `THEME: ${currentActiveTheme.toUpperCase()}${suffix}`;
    }

    async function refreshWordBank(driftWord = null) {
        if (isFetching) return;
        isFetching = true;
        let seed = driftWord || document.getElementById('custom-theme').value.trim().toLowerCase();
        if (!seed) seed = backupWords[Math.floor(Math.random() * backupWords.length)].toLowerCase();

        if (themeHistory.includes(seed) && driftWord) {
            seed = backupWords[Math.floor(Math.random() * backupWords.length)].toLowerCase();
        }
        themeHistory.push(seed); if (themeHistory.length > 15) themeHistory.shift();

        currentActiveTheme = seed;
        updateBadgeDisplay(!!driftWord);

        try {
            const response = await fetch(`https://api.datamuse.com/words?${currentMode === 'assoc' ? 'ml' : 'rel_rhy'}=${seed}&max=300&md=sf`);
            const data = await response.json();
            const filtered = data.filter(obj => {
                const word = obj.word.toUpperCase();
                const freqStr = (obj.tags && obj.tags.find(t => t.startsWith('f:'))) ? obj.tags.find(t => t.startsWith('f:')).split(':')[1] : "0";
                const freq = parseFloat(freqStr);
                const isCommonEnough = freq > 0.01 || data.length < 20;
                const apiSyl = obj.numSyllables || 1;
                const localSyl = countSyllables(word);
                const sylOk = apiSyl <= maxSyllables && localSyl <= maxSyllables;
                return !usedWords.has(word) && sylOk && isCommonEnough && /^[a-zA-Z]+$/.test(word);
            }).map(obj => obj.word.toUpperCase());

            if (filtered.length > 3) {
                wordBank = filtered.sort(() => Math.random() - 0.5);
                wordPointer = 0; wordsSinceLastDrift = 0;
            } else {
                isFetching = false; refreshWordBank();
            }
        } catch (e) { wordBank = backupWords; } finally { isFetching = false; }
    }

    function tick(step) {
        if (audioCtx && !isMuted) {
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            const freq = (step % 4 === 0) ? 1200 : 800;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.04);
        }

        if (step % wordInterval === 0) {
            lastWordTime = audioCtx.currentTime;
            let nextWord = wordBank[wordPointer++] || "DRIFTING...";
            if (nextWord !== "DRIFTING...") usedWords.add(nextWord);
            wordsSinceLastDrift++;

            if (document.getElementById('drift-toggle').checked && wordsSinceLastDrift >= driftFreq && !isFetching) {
                refreshWordBank(nextWord.toLowerCase());
            }

            const display = document.getElementById('word-display');
            const currentText = Array.from(display.childNodes).find(n => n.nodeType === 3)?.textContent || "";
            if (currentText && currentText !== "READY" && currentText !== "DRIFTING...") {
                history.unshift(currentText.trim()); if (history.length > 6) history.pop();
                document.getElementById('history').innerText = history.join(" • ");
            }
            display.childNodes.forEach(node => { if (node.nodeType === 3) display.removeChild(node); });
            display.appendChild(document.createTextNode(nextWord));
        }
    }

    function scheduler() { if (isRunning && !midiEnabled) { while (nextNoteTime < audioCtx.currentTime + 0.1) { tick(currentStep++); nextNoteTime += 60.0 / bpm; } timerID = setTimeout(scheduler, 25.0); } }
    function updateVisuals() { if (isRunning) { const bar = document.getElementById('timer-bar'); const progress = Math.min((audioCtx.currentTime - lastWordTime) / ((60/bpm)*wordInterval), 1); bar.style.width = `${(1-progress)*100}%`; animationID = requestAnimationFrame(updateVisuals); } }
    
    // MIDI LOGIC RESTORED
    async function toggleMidi() {
        const btn = document.getElementById('midi-btn'), startBtn = document.getElementById('start-btn'), hint = document.getElementById('midi-hint');
        if (!midiEnabled) {
            try {
                // Fix for your console warning: specify sysex requirement explicitly
                midiAccess = await navigator.requestMIDIAccess({ sysex: false });
                for (let input of midiAccess.inputs.values()) input.onmidimessage = handleMidiMessage;
                midiEnabled = true;
                btn.innerText = "MIDI SYNC: ON"; btn.classList.add('active');
                if (!isMuted) toggleMute();
                startBtn.disabled = true; startBtn.classList.add('midi-waiting'); startBtn.innerText = "AWAITING MIDI START...";
                hint.classList.add('show'); document.getElementById('bpm-slider').disabled = true;
            } catch (e) { console.debug("MIDI Error:", e); alert("MIDI access denied."); }
        } else {
            midiEnabled = false;
            btn.innerText = "MIDI SYNC: OFF"; btn.classList.remove('active');
            if (isMuted) toggleMute();
            startBtn.disabled = false; startBtn.classList.remove('midi-waiting', 'midi-active');
            startBtn.innerText = "START SESSION"; hint.classList.remove('show'); document.getElementById('bpm-slider').disabled = false;
            if (isRunning) toggleSession();
            clearInterval(failsafeTimer);
        }
    }

    function handleMidiMessage(msg) {
        if (!midiEnabled) return;
        const status = msg.data[0];
        if (status === 0xFA || status === 0xFB) { // MIDI Start or Continue
            midiTickCount = 0; currentStep = 0; lastMidiPulseTime = performance.now(); 
            if (!isRunning) toggleSession(true); 
        }
        if (status === 0xFC) { if (isRunning) toggleSession(true); } // MIDI Stop
        if (status === 0xF8) { // MIDI Clock Pulse (24 per quarter note)
            lastMidiPulseTime = performance.now();
            if (isRunning) {
                if (midiTickCount === 0) tick(currentStep++);
                midiTickCount++;
                if (midiTickCount >= 24) midiTickCount = 0;
            }
        }
    }

    function startPulseWatchdog() { failsafeTimer = setInterval(() => { if (isRunning && midiEnabled && performance.now() - lastMidiPulseTime > 250) toggleSession(true); }, 100); }

    async function toggleSession(fromMidi = false) {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const btn = document.getElementById('start-btn');
        
        if (isRunning) {
            isRunning = false;
            clearTimeout(timerID); cancelAnimationFrame(animationID); clearInterval(failsafeTimer);
            if (!midiEnabled) { btn.innerText = "START SESSION"; btn.style.background = "#00ffcc"; }
            else { btn.innerText = "AWAITING MIDI START..."; btn.classList.add('midi-waiting'); btn.disabled = true; }
        } else {
            isRunning = true; nextNoteTime = audioCtx.currentTime; lastWordTime = audioCtx.currentTime; currentStep = 0;
            if (!midiEnabled) { scheduler(); btn.innerText = "STOP"; btn.style.background = "#ff4444"; }
            else { btn.disabled = false; btn.classList.remove('midi-waiting'); btn.classList.add('midi-active'); btn.innerText = "MIDI ACTIVE - CLICK TO KILL"; startPulseWatchdog(); }
            updateVisuals();
        }
    }

    function updateDriftUI() { 
        document.getElementById('drift-slider-container').style.opacity = document.getElementById('drift-toggle').checked ? "1" : "0.3";
        updateBadgeDisplay();
    }

    function forceNewTheme() { usedWords.clear(); refreshWordBank(); }
    function updateBPM(v) { bpm = v; document.getElementById('bpm-val').innerText = v; }
    function updateBars(v) { wordInterval = v; document.getElementById('bar-val').innerText = v; }
    function updateSyllables(v) { maxSyllables = v; document.getElementById('syl-val').innerText = v; refreshWordBank(); }
    function updateDriftFreq(v) { driftFreq = v; document.getElementById('drift-val').innerText = v; }
    function setMode(m) { currentMode = m; document.getElementById('mode-assoc').classList.toggle('active', m==='assoc'); document.getElementById('mode-rhyme').classList.toggle('active', m==='rhyme'); forceNewTheme(); }
    function toggleMute() { isMuted = !isMuted; document.getElementById('mute-toggle').classList.toggle('active', isMuted); }
    function toggleFullScreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

    refreshWordBank();
</script>
</body>
</html>
